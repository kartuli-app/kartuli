# This file is not currently used: SonarCloud is integrated via the GitHub app
# (automatic analysis), not via manual CI, so the scanner does not read this config.
# To exclude the same paths in SonarCloud (UI): open
# https://sonarcloud.io/project/settings?category=exclusions&id=kartuli-app_kartuli
# and add the same patterns as below.
#
# Exclude generated artifacts from analysis (not source code)
# Exclude library static data (repetitive structure triggers duplication; keep in sync with UI exclusions)
sonar.exclusions=diagrams/output/**,**/core/library/data/**

# Duplication exclusions (keep in sync with SonarCloud UI: Duplication exclusions)
# Intentional duplication between app tailwind-integration tests; refactor planned later
sonar.cpd.exclusions=**/tailwind-integration.test.ts
