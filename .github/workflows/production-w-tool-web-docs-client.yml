name: Production – Web Docs Client

# Production deploy: validate, generate LLM bundle, build, deploy to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'tools/web-docs-client/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/production-w-tool-web-docs-client.yml'
  workflow_dispatch:

concurrency:
  group: production-w-tool-web-docs-client-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: CI setup node
        uses: ./.github/actions/ci-setup-node

      - name: CI validate monorepo package
        uses: ./.github/actions/ci-validate-monorepo-package
        with:
          target: web-docs-client

      - name: Build docs
        run: pnpm turbo run build --filter=@kartuli/web-docs-client
        shell: bash

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: tools/web-docs-client/.vitepress/dist

  deploy:
    name: deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Build Telegram production deploy message
        if: success()
        id: notify_prod
        env:
          WHO: ${{ github.actor }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "message<<NOTIFY_EOF" >> "$GITHUB_OUTPUT"
          echo "[Production] web-docs-client deployed by $WHO" >> "$GITHUB_OUTPUT"
          echo "URL: $PAGE_URL" >> "$GITHUB_OUTPUT"
          echo "Run: $RUN_URL" >> "$GITHUB_OUTPUT"
          echo "NOTIFY_EOF" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Notify Telegram – Deployments Production
        if: success()
        uses: ./.github/actions/telegram-send-message
        with:
          telegram_bot_token: ${{ secrets.KARTULIAPP_TEAM_BOT_TOKEN }}
          chat_id: ${{ secrets.KARTULIAPP_TEAM_GROUP_CHAT_ID }}
          message_thread_id: ${{ secrets.KARTULIAPP_TEAM_TOPIC_PRODUCTION_DEPLOYMENTS_ID }}
          message: ${{ steps.notify_prod.outputs.message }}

      - name: CI setup node
        uses: ./.github/actions/ci-setup-node

      - name: Setup Playwright
        uses: ./.github/actions/ci-setup-playwright

      - name: Wait for GitHub Pages propagation
        env:
          BASE_URL: "https://kartuli-app.github.io/kartuli/"
        run: |
          set -euo pipefail
          ready=0
          for i in $(seq 1 60); do
            if curl -fsS "${BASE_URL}" >/dev/null 2>&1 && \
               curl -fsS "${BASE_URL}assets/kartuli-llm.txt" | grep -qi "kartuli"; then
              ready=1
              break
            fi
            sleep 5
          done

          if [ "$ready" -ne 1 ]; then
            echo "ERROR: GitHub Pages content did not propagate before timeout."
            exit 1
          fi
        shell: bash

      - name: Run E2E
        env:
          BASE_URL: "https://kartuli-app.github.io/kartuli/"
        run: pnpm --filter @kartuli/e2e exec playwright test tests/web-docs-client
        shell: bash

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts-web-docs-client-${{ github.run_number }}
          path: tools/e2e/test-results/
          retention-days: 3

      - name: Build Telegram post-deploy E2E failure message
        if: failure()
        id: notify_prod_e2e_failed
        env:
          WHO: ${{ github.actor }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "message<<NOTIFY_EOF" >> "$GITHUB_OUTPUT"
          echo "[Production] web-docs-client deployed, but post-deploy E2E failed ($WHO)" >> "$GITHUB_OUTPUT"
          echo "URL: $PAGE_URL" >> "$GITHUB_OUTPUT"
          echo "Run: $RUN_URL" >> "$GITHUB_OUTPUT"
          echo "NOTIFY_EOF" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Notify Telegram – Post-deploy E2E failure
        if: failure()
        uses: ./.github/actions/telegram-send-message
        with:
          telegram_bot_token: ${{ secrets.KARTULIAPP_TEAM_BOT_TOKEN }}
          chat_id: ${{ secrets.KARTULIAPP_TEAM_GROUP_CHAT_ID }}
          message_thread_id: ${{ secrets.KARTULIAPP_TEAM_TOPIC_PRODUCTION_DEPLOYMENTS_ID }}
          message: ${{ steps.notify_prod_e2e_failed.outputs.message }}
