# Generate dependency diagram (Mermaid) for a Next.js app. Used by orchestrator once per app; also runnable manually.
name: Staging - Next.js app (diagram only)

run-name: "Staging Next.js diagram - ${{ inputs.target }}"

on:
  workflow_call:
    inputs:
      target:
        description: Target workspace (e.g. game-client, backoffice-client).
        required: true
        type: string
      pull_request_number:
        description: PR number (for commenting when called from orchestrator).
        required: false
        type: string
  workflow_dispatch:
    inputs:
      target:
        description: App to generate dependency diagram for.
        required: true
        type: choice
        default: game-client
        options:
          - game-client
          - backoffice-client

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-diagram:
    name: generate-diagram
    runs-on: ubuntu-latest
    env:
      TARGET: ${{ inputs.target }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: CI setup node
        uses: ./.github/actions/ci-setup-node

      - name: Generate dependency diagram (mermaid)
        run: pnpm run diagrams:"$TARGET":mermaid
        shell: bash

      - name: Write dependency diagram to job summary
        if: github.event_name != 'pull_request' && (inputs.pull_request_number == '' || inputs.pull_request_number == null)
        run: |
          MMDF="diagrams/output/diagram-${TARGET}.mmd"
          if [ -f "$MMDF" ]; then
            echo "## Dependency diagram ($TARGET)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```mermaid' >> "$GITHUB_STEP_SUMMARY"
            cat "$MMDF" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
        shell: bash

      - name: Comment PR with dependency diagram
        if: github.event_name == 'pull_request' || inputs.pull_request_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number || '${{ inputs.pull_request_number }}';
            const prNum = Number(prNumber);
            if (!prNum) return;
            const target = '${{ inputs.target }}';
            let body = '';
            try {
              const fs = require('fs');
              const path = require('path');
              const diagramPath = path.join(process.env.GITHUB_WORKSPACE || '.', 'diagrams', 'output', `diagram-${target}.mmd`);
              if (fs.existsSync(diagramPath)) {
                const diagram = fs.readFileSync(diagramPath, 'utf8');
                body = `## Dependency diagram – ${target}\n\n\`\`\`mermaid\n${diagram}\n\`\`\`\n\n---\n*Staging pipeline*`;
              }
            } catch (e) {}
            if (!body) return;
            const label = `## Dependency diagram – ${target}\n`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNum,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith(label)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body,
              });
            }
