name: CI quality Lighthouse
description: >
  Run Lighthouse CI via treosh/lighthouse-ci-action with a repo-root LHCI JSON config (same shape as
  lighthouse-ci collect/assert/upload). Results appear as GitHub check annotations; artifacts and
  temporary public storage uploads are enabled. Requires checkout so configPath exists; callers
  typically run ci-setup-node for other jobs in the same workflow.

inputs:
  config_name:
    description: Basename without .json under repo root (e.g. lighthouse-config-production).
    required: true
  url:
    description: Single URL to audit.
    required: true
  artifact_name:
    description: >
      GitHub Actions artifact name for treosh uploadArtifacts (default treosh name is
      lighthouse-results). Use a unique value per matrix job, e.g. lighthouse-game-client-local.
    required: false
    default: lighthouse-results

outputs:
  report_url:
    description: First uploaded report URL from the action links JSON output, when present (for Telegram, etc.).
    value: ${{ steps.extract_report.outputs.report_url }}

runs:
  using: composite
  steps:
    - id: lhci
      name: Lighthouse CI
      uses: treosh/lighthouse-ci-action@v12
      env:
        CI_AUDIT: ${{ env.CI_AUDIT }}
      with:
        urls: ${{ inputs.url }}
        configPath: ${{ github.workspace }}/${{ inputs.config_name }}.json
        uploadArtifacts: true
        artifactName: ${{ inputs.artifact_name }}
        temporaryPublicStorage: true

    - id: extract_report
      name: Extract report URL from LHCI links output
      if: always()
      env:
        LINKS: ${{ steps.lhci.outputs.links }}
      run: |
        set -euo pipefail
        REPORT_URL=""
        if [ -n "${LINKS:-}" ] && [ "$LINKS" != "null" ]; then
          REPORT_URL=$(printf '%s' "$LINKS" | jq -r '
            [.. | strings?
              | select(startswith("https://")
                and (contains("storage.googleapis.com") or contains("lhci-viewer")))
            ] | first // empty
          ')
        fi
        {
          echo "report_url<<REPORT_URL_EOF"
          printf '%s\n' "$REPORT_URL"
          echo "REPORT_URL_EOF"
        } >> "$GITHUB_OUTPUT"
      shell: bash

    - name: Lighthouse job summary
      if: always()
      shell: bash
      env:
        AUDIT_URL: ${{ inputs.url }}
        REPORT_URL: ${{ steps.extract_report.outputs.report_url }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
      run: |
        {
          echo "## Lighthouse CI"
          echo ""
          echo "- **Audited URL:** \`${AUDIT_URL}\`"
          echo "- **GitHub artifact name:** \`${ARTIFACT_NAME}\`"
          if [ -n "${REPORT_URL:-}" ]; then
            echo "- **LHCI public report:** ${REPORT_URL}"
          else
            echo "- **LHCI public report:** not found in \`links\` output (often empty when the run fails before upload); use the artifact ZIP and open HTML under \`.lighthouseci/\`."
          fi
          echo ""
          echo "On the workflow run page, each matrix job lists its own artifacts; pick **${ARTIFACT_NAME}** for this job."
        } >> "$GITHUB_STEP_SUMMARY"
